<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Clima Colima - Lesly Vaca</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #64b3f4, #c2e59c);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            width: 320px;
        }
        h1 { color: #2c3e50; margin: 0; font-size: 1.5rem; }
        .temp { font-size: 4rem; font-weight: bold; color: #e67e22; margin: 10px 0; }
        .sensacion { color: #7f8c8d; font-size: 1.1rem; margin-bottom: 20px; }
        button {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }
        button:hover { background: #2980b9; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Colima, MX</h1>
        <div class="temp" id="valor-temp">--°</div>
        <div class="sensacion" id="valor-sensacion">Sensación: --</div>
        <button onclick="consultar()">Consultar Clima</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.6.2/axios.min.js"></script>
    <script>
        async function consultar() {
            const tempDiv = document.getElementById('valor-temp');
            const sensDiv = document.getElementById('valor-sensacion');
            
            try {
                tempDiv.textContent = "...";
                const res = await axios.get('http://localhost:3000/clima');
                
                // Actualizamos ambos datos en la pantalla
                tempDiv.textContent = res.data.temp;
                sensDiv.innerHTML = `Sensación térmica: <b>${res.data.sensacion}</b>`;
                
            } catch (e) {
                tempDiv.textContent = "❌";
                sensDiv.textContent = "Error al conectar";
            }
        }
    </script>
</body>
</html>
